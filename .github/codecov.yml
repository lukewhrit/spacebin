ignore:
  - "cmd/" # Entry point with OS-level dependencies; not feasible in unit tests
  - "internal/database/database_mysql.go" # Requires live MySQL connection
  - "internal/database/database_pg.go" # Requires live PostgreSQL connection
  - "internal/database/database_sqlite.go" # Requires live SQLite connection
  - "internal/database/migrations.go" # Requires live database connection
  - "internal/database/databasefakes/" # Auto-generated counterfeiter code
  - "internal/util/logger.go" # Thin zerolog middleware wrapper; no testable logic
  - "internal/server/config.go" # Single-line passthrough; error branch unreachable
